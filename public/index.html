<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WilleAI Publish Studio</title>
    <meta name="description" content="WilleAI 跨平台内容发布工作台" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=20260630-tight2" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-label="WilleAI">
          <span class="brand-glyph">W</span>
          <span>
            <strong>Publish Studio</strong>
            <small>WilleAI</small>
          </span>
        </div>

        <nav class="top-nav" aria-label="发布流程">
          <a class="top-nav-link is-active" href="#editorTitle">内容</a>
          <a class="top-nav-link" href="#accountsTitle">账号</a>
          <a class="top-nav-link" href="#resultTitle">预检</a>
        </nav>

        <div class="topbar-status" aria-live="polite">
          <span class="status-pill" id="environmentStatus">
            <span class="status-dot"></span>
            环境检查中
          </span>
          <button class="icon-button" id="refreshButton" type="button" title="刷新状态" aria-label="刷新状态">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6M18 2v4h-4M6 22v-4h4" />
            </svg>
          </button>
        </div>
      </header>

      <section class="studio-intro" aria-label="工作台概览">
        <div class="title-block">
          <p class="eyebrow">publish.willeai.cn</p>
          <h1>发布工作台</h1>
        </div>
        <div class="command-center" aria-label="发布工作台状态">
          <div class="metric-tile">
            <span>可用账号</span>
            <strong id="connectedMetric">0</strong>
          </div>
          <div class="metric-tile">
            <span>已选目标</span>
            <strong id="selectedMetric">0</strong>
          </div>
          <div class="metric-tile">
            <span>素材队列</span>
            <strong id="mediaMetric">0</strong>
          </div>
          <div class="metric-tile is-wide">
            <span>预检状态</span>
            <strong id="preflightMetric">待填写</strong>
          </div>
        </div>
      </section>

      <main class="workspace">
        <section class="panel accounts-panel" aria-labelledby="accountsTitle">
          <div class="panel-header">
            <div>
              <p class="section-kicker">账号</p>
              <h2 id="accountsTitle">发布目标</h2>
            </div>
            <span class="meta" id="accountCount">0 个账号</span>
          </div>
          <div class="platform-grid" id="platformGrid"></div>
        </section>

        <section class="panel editor-panel" aria-labelledby="editorTitle">
          <div class="panel-header editor-toolbar">
            <div>
              <p class="section-kicker">内容</p>
              <h2 id="editorTitle">准备发布</h2>
            </div>
            <div class="segmented" role="group" aria-label="素材类型">
              <button type="button" class="segment is-active" data-media-mode="video">视频</button>
              <button type="button" class="segment" data-media-mode="images">图文</button>
            </div>
          </div>

          <form id="publishForm" class="publish-form">
            <label class="field title-field">
              <span>标题</span>
              <input id="titleInput" type="text" maxlength="120" placeholder="填写要同步到各平台的标题" />
            </label>
            <label class="field">
              <span>正文</span>
              <textarea id="bodyInput" rows="8" placeholder="填写正文、话题、说明。平台限制会在预检区提示。"></textarea>
            </label>
            <label class="field">
              <span id="mediaLabel">视频 URL</span>
              <textarea id="mediaInput" rows="4" placeholder="每行一个公开视频或图片 HTTPS URL"></textarea>
            </label>
            <div class="inline-fields">
              <label class="field">
                <span>封面 URL</span>
                <input id="coverInput" type="url" placeholder="可选，HTTPS URL" />
              </label>
              <label class="field">
                <span>发布时间</span>
                <input id="publishAtInput" type="datetime-local" />
              </label>
            </div>
            <div class="action-row">
              <button class="primary-button" id="publishButton" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m22 2-7 20-4-9-9-4Z" />
                  <path d="M22 2 11 13" />
                </svg>
                一键发布
              </button>
              <button class="secondary-button" id="clearButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 6h18" />
                  <path d="M8 6V4h8v2" />
                  <path d="m19 6-1 14H6L5 6" />
                </svg>
                清空
              </button>
            </div>
          </form>
        </section>

        <section class="panel result-panel" aria-labelledby="resultTitle">
          <div class="panel-header">
            <div>
              <p class="section-kicker">预检</p>
              <h2 id="resultTitle">发布流</h2>
            </div>
            <span class="meta" id="flowMeta">未提交</span>
          </div>

          <div class="pipeline-strip" aria-label="发布阶段">
            <span class="pipeline-step" id="pipelineStepAccounts">账号</span>
            <span class="pipeline-step" id="pipelineStepContent">内容</span>
            <span class="pipeline-step" id="pipelineStepPreflight">预检</span>
            <span class="pipeline-step" id="pipelineStepSubmit">发布</span>
          </div>
          <div class="preflight" id="preflightList" aria-live="polite"></div>
          <div class="flow-box" id="flowBox">
            <p class="empty-state">选择账号并填写 HTTPS 素材 URL 后，预检和发布结果会显示在这里。</p>
          </div>
        </section>
      </main>
    </div>

    <div class="toast-region" id="toastRegion" aria-live="polite"></div>
    <script src="/app.js?v=20260630-tight2" type="module"></script>
  </body>
</html>
